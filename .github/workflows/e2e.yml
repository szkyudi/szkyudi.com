name: E2E

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

# 同一 PR の古い実行はキャンセルする
concurrency:
  group: e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # スクショ用ブランチ(e2e-screenshots)への push
  pull-requests: write # PR コメント投稿

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E (build + preview + screenshots)
        run: npm run e2e

      - name: Upload report & screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            e2e/screenshots/
          retention-days: 14

      - name: Publish screenshots to PR
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: bash .github/scripts/publish-screenshots.sh
