name: E2E

# 通常は Claude Code の /ship が E2E を回し、スクショを e2e/screenshots/ にコミットして
# PR に反映する（CI 消費ゼロ）。この CI は保険としての「手動実行のみ」の検証ジョブ。
# 実行すると E2E を回し、レポートとスクショを成果物(artifact)として保存する。
on:
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E (build + preview + screenshots)
        run: pnpm run e2e

      - name: Upload report & screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            e2e/screenshots/
          retention-days: 14
